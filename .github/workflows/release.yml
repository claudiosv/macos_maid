---
name: Production Build & Release
on:
  # Triggers the workflow when a version tag is pushed (e.g., git tag v1.0.0 && git push origin v1.0.0)
  push:
    tags:
      - v*
  # Allows you to trigger the workflow manually from the GitHub Actions tab
  workflow_dispatch:
jobs:
  build-and-release:
    runs-on: ubuntu-latest

    # Required permission to create a release in the repository
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.2' # Bashly requires Ruby
          bundler-cache: true
      - name: Install Bashly
        run: gem install bashly
      - name: Set up Just
        uses: extractions/setup-just@v4
      - name: Set up shfmt
        uses: mfinelli/setup-shfmt@v4
      - name: Build production script
        run: just production
      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: maid.sh
          generate_release_notes: true
          body: |
            ## 🚀 Installation

            To install or update **macOS Maid** (${{ github.ref_name }}), run the following command in your terminal:

            ```bash
            curl -fsSL [https://github.com/$](https://github.com/$){{ github.repository }}/releases/latest/download/maid.sh -o /usr/local/bin/maid && chmod +x /usr/local/bin/maid
            ```

            *Note: You may need to run this with `sudo` depending on your `/usr/local/bin` permissions.*
